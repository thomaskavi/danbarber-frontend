<div class="servicos">
  <header>
    <h1>Novo funcionário</h1>
    <a routerLink="/dashboard">Cancelar</a>
  </header>

  <section class="form-servico">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <label for="nome">Nome</label>
      <input id="nome" type="text" formControlName="nome" />

      <label for="login">Login</label>
      <input id="login" type="text" formControlName="login" autocomplete="username" />

      <label for="senha">Senha</label>
      <input id="senha" type="password" formControlName="senha" autocomplete="new-password" />

      <label class="checkbox-linha">
        <input type="checkbox" formControlName="temComissao" />
        Este funcionário recebe comissão
      </label>

      @if (form.value.temComissao) {
        <label for="percentualComissao">Percentual de comissão (%)</label>
        <input id="percentualComissao" type="number" step="0.01" formControlName="percentualComissao" />
      }

      <div class="acoes-form">
        <button type="submit" [disabled]="form.invalid || enviando()">
          {{ enviando() ? 'Salvando...' : 'Cadastrar funcionário' }}
        </button>
      </div>
    </form>
  </section>
</div>
