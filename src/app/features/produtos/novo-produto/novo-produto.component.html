<div class="servicos">
  <header>
    <h1>Novo produto</h1>
    <a routerLink="/produtos">Cancelar</a>
  </header>

  <section class="form-servico">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <label for="nome">Nome</label>
      <input id="nome" type="text" formControlName="nome" placeholder="Ex: Pomada, Shampoo..." />

      <label for="preco">Preço</label>
      <input id="preco" type="number" step="0.01" formControlName="preco" />

      <label for="quantidadeEstoque">Quantidade inicial em estoque</label>
      <input id="quantidadeEstoque" type="number" formControlName="quantidadeEstoque" />

      <div class="acoes-form">
        <button type="submit" [disabled]="form.invalid || enviando()">
          {{ enviando() ? 'Salvando...' : 'Salvar' }}
        </button>
        <a routerLink="/produtos" class="botao-secundario">Cancelar</a>
      </div>
    </form>
  </section>
</div>
