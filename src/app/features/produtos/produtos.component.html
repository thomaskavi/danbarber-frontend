<div class="produtos-lista">

  <header>
    <a routerLink="/dashboard" class="botao-secundario">← Voltar</a>
    <h1>Produtos</h1>
    <a routerLink="/produtos/novo" class="botao-principal">+ Novo Produto</a>
  </header>

  <div class="busca">
    <input
      type="text"
      placeholder="Buscar produto por nome..."
      [value]="termoBusca()"
      (input)="onBuscaChange($any($event.target).value)"
    />
  </div>

  @if (carregando()) {
    <p>Carregando...</p>
  }

  @if (!carregando()) {
    <section class="lista">
      @for (produto of produtos(); track produto.id) {
        <button type="button" class="item-produto" (click)="abrirDetalhe(produto)">
          <div class="info-produto">
            <strong>{{ produto.nome }}</strong>
            <span>R$ {{ produto.preco.toFixed(2) }}</span>
            <span [class.estoque-baixo]="estoqueBaixo(produto)">
              Estoque: {{ produto.quantidadeEstoque }}
              @if (estoqueBaixo(produto)) {
                <span class="badge-alerta">Baixo</span>
              }
            </span>
          </div>
          <span class="seta">›</span>
        </button>
      } @empty {
        <p>Nenhum produto encontrado.</p>
      }
    </section>

    @if (totalPaginas() > 1) {
      <div class="paginacao">
        <button type="button" (click)="paginaAnterior()" [disabled]="paginaAtual() === 0">‹ Anterior</button>
        <span>Página {{ paginaAtual() + 1 }} de {{ totalPaginas() }}</span>
        <button type="button" (click)="proximaPagina()" [disabled]="paginaAtual() + 1 >= totalPaginas()">Próxima ›</button>
      </div>
    }
  }

</div>
