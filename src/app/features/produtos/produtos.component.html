<div class="produtos-lista">

  <header>
    <h1>Produtos</h1>
    <div class="header-acoes">
      <a routerLink="/dashboard" class="botao-secundario">
        <i class="ti ti-arrow-left" aria-hidden="true"></i>Voltar
      </a>
      <a routerLink="/produtos/novo" class="botao-principal">
        <i class="ti ti-plus" aria-hidden="true"></i>Novo produto
      </a>
    </div>
  </header>

  <div class="busca">
    <i class="ti ti-search" aria-hidden="true"></i>
    <input
      type="text"
      placeholder="Buscar produto por nome..."
      [value]="termoBusca()"
      (input)="onBuscaChange($any($event.target).value)"
    />
  </div>

  @if (carregando()) {
    <p>Carregando...</p>
  }

  @if (!carregando()) {
    <section class="lista">
      @for (produto of produtos(); track produto.id) {
        <button type="button" class="item-produto" (click)="abrirDetalhe(produto)">
          <div class="info-produto">
            <strong>{{ produto.nome }}</strong>
            <span>R$ {{ produto.preco.toFixed(2) }}</span>
            <span [class.estoque-baixo]="estoqueBaixo(produto)">
              Estoque: {{ produto.quantidadeEstoque }}
              @if (estoqueBaixo(produto)) {
                <span class="badge-alerta">Baixo</span>
              }
            </span>
          </div>
          <i class="ti ti-chevron-right seta" aria-hidden="true"></i>
        </button>
      } @empty {
        <p class="vazio">Nenhum produto encontrado.</p>
      }
    </section>

    @if (totalPaginas() > 1) {
      <div class="paginacao">
        <button type="button" class="botao-secundario" (click)="paginaAnterior()" [disabled]="paginaAtual() === 0">
          <i class="ti ti-chevron-left" aria-hidden="true"></i>Anterior
        </button>
        <span>Página {{ paginaAtual() + 1 }} de {{ totalPaginas() }}</span>
        <button type="button" class="botao-secundario" (click)="proximaPagina()" [disabled]="paginaAtual() + 1 >= totalPaginas()">
          Próxima<i class="ti ti-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
    }
  }

</div>
