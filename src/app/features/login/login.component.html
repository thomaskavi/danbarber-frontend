<div class="login-container">
  <div class="marca"><i class="ti ti-building-bank" aria-hidden="true"></i></div>
  <h1>Simplex</h1>
  <p class="subtitulo">Entre para acessar seu painel</p>

  <form [formGroup]="form" (ngSubmit)="entrar()">
    <label for="login">Login</label>
    <input id="login" type="text" formControlName="login" autocomplete="username" />

    <label for="senha">Senha</label>
    <input id="senha" type="password" formControlName="senha" autocomplete="current-password" />

    <button type="submit" [disabled]="form.invalid || carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
  <a routerLink="/criar-conta">Não tem uma conta? Crie uma agora!</a>
</div>
