<div class="login-container">
  <div class="marca"><i class="ti ti-building-bank" aria-hidden="true"></i></div>
  <h1>Criar conta</h1>
  <p class="subtitulo">Configure sua empresa em poucos passos</p>

  <form [formGroup]="form" (ngSubmit)="registrar()">
    <label for="nomeEmpresa">Nome da empresa</label>
    <input id="nomeEmpresa" type="text" formControlName="nomeEmpresa" />

    <label for="ramo">Ramo</label>
    <select id="ramo" formControlName="ramo">
      <option value="" disabled selected>Selecione o ramo</option>
      <option value="ATENDIMENTO">Atendimento</option>
      <option value="VENDAS">Vendas</option>
      <option value="OUTRO">Outro</option>
    </select>

    <label for="nomeDono">Seu nome</label>
    <input id="nomeDono" type="text" formControlName="nomeDono" />

    <label for="login">Login</label>
    <input id="login" type="text" formControlName="login" autocomplete="username" />

    <label for="senha">Senha</label>
    <input id="senha" type="password" formControlName="senha" autocomplete="new-password" />

    @if (erro) {
      <p class="erro">{{ erro }}</p>
    }

    <button type="submit" [disabled]="form.invalid || carregando">
      {{ carregando ? 'Criando...' : 'Criar conta' }}
    </button>
  </form>

  <a routerLink="/login">Já tem uma conta? Entrar</a>
</div>
